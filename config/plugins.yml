# Lampa plugin registry — single source of truth.
#
# Edit this file when you add, rename, move, or remove a plugin. Then run:
#
#   ./scripts/build-catalog.py        # regenerate extensions.json for store.js
#
# Never edit the Python script to add a plugin — the registry is the interface.
#
# There is no standalone installer plugin anymore. store.js is the only user-
# facing install URL; it opens Lampa's native extensions store UI against
# `catalog_url` below, and users install/remove everything from there.
#
# Infrastructure plugins (anything under app/support/) are NOT listed here —
# they're auto-injected into localStorage.plugins by store.js via its own
# hardcoded AUTO_INSTALL list, so they never appear in the user-facing store.

base_url: https://vahagn-99.github.io/lampa/app/plugins

# URL Lampa's native store UI (opened by app/store.js) fetches at runtime.
# Must match the final location where build-catalog.py writes extensions.json.
catalog_url: https://vahagn-99.github.io/lampa/storage/extensions.json

# Optional: plugins from `plugins:` below that store.js should pre-install
# silently on every Lampa start. Keep minimal — it's non-opt-in for users.
# Infrastructure bootstrap (log-collector, etc.) goes through store.js's own
# AUTO_INSTALL array, not through this key.
auto_install: []

# Store UI labels (shown inside Lampa → Настройки → <store title>)
store:
  title_ru: Мои плагины
  title_en: My plugins

# Category grouping for the catalog. Every plugin references one by key.
categories:
  mine:
    title_ru: Мои плагины
    title_en: My plugins

  diagnostics:
    title_ru: Диагностика и отладка
    title_en: Diagnostics & debug

  bridges:
    title_ru: Мосты к источникам
    title_en: Source bridges

  server:
    title_ru: Серверные интеграции
    title_en: Server integrations

plugins:

  segment-source:
    file: segment-source.js
    aliases: [segments, segment, autoskip, skip, skip-intro]
    display_name: Источник сегментов
    description: Тайм-коды интро / recap / титров для штатного автопропуска Lampa. Читает MKV-чаптеры из TorrServe; fallback на TheIntroDB. Настройка — в плеере, меню «Сегменты»
    author: "@vahagn_99"
    category: mine
    version: "2.0.0"

  last-watched-resume:
    file: last-watched-resume.js
    aliases: [lwr, last-watched, resume, continue]
    display_name: Продолжить просмотр
    description: Ряд «Последние просмотренные» на главном экране — 5 последних тайтлов, онлайн и торренты
    author: "@vahagn_99"
    category: mine
    version: "0.1.0"

  torrserver-discovery:
    file: torrserver-discovery.js
    aliases: [tsd, torrserver]
    display_name: Поиск TorrServer
    description: Автопоиск TorrServer в локальной сети — без ручного ввода IP:port
    author: "@vahagn_99"
    category: server

  kinopub-bridge:
    file: kinopub-bridge.js
    aliases: [kpb, kinopub]
    display_name: Мост KinoPub
    description: AppleTV → Z01 Online с KinoPub в качестве источника по умолчанию
    author: "@vahagn_99"
    category: bridges

  store:
    # Lives under app/ rather than plugins/, so pin an explicit url and
    # skip the base_url + file derivation.
    url: https://vahagn-99.github.io/lampa/app/store.js
    aliases: [marketplace]
    display_name: Мой магазин плагинов
    description: Открывает мой магазин плагинов из настроек Lampa
    author: "@vahagn_99"
    category: mine
    # Landing page has a dedicated hero block for this; skip it in auto-gen.
    landing_hidden: true
